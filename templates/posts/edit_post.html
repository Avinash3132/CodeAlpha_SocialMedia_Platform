{% extends 'base.html' %}
{% block title %}Edit Post | ConnectHub{% endblock %}

{% block content %}
<div class="container">
  <div class="row justify-content-center">
    <div class="col-lg-6">
      <div class="card">
        <div style="background:var(--gradient); padding:1.5rem;
                    border-radius:var(--radius) var(--radius) 0 0;
                    color:white;">
          <h5 style="font-family:'Poppins',sans-serif;
                     font-weight:700; margin:0;">
            <i class="bi bi-pencil me-2"></i>Edit Post
          </h5>
        </div>
        <div class="card-body p-4">
          <form method="post" enctype="multipart/form-data">
            {% csrf_token %}

            <div class="mb-3">
              <label class="form-label">Content</label>
              {{ form.content }}
            </div>

            {% if post.image %}
            <div class="mb-3">
              <label class="form-label">Current Image</label>
              <div>
                <img src="{{ post.image.url }}"
                     style="max-width:100%; border-radius:var(--radius-sm);
                            max-height:250px; object-fit:cover;"/>
              </div>
            </div>
            {% endif %}

            <div class="mb-4">
              <label class="form-label">
                {% if post.image %}Replace Image{% else %}Add Image{% endif %}
              </label>
              {{ form.image }}
            </div>

            <div class="d-flex gap-3">
              <button type="submit" class="btn-primary-custom"
                      style="flex:1; justify-content:center;">
                <i class="bi bi-check-lg"></i> Save Changes
              </button>
              <a href="{% url 'posts:post_detail' post.id %}"
                 class="btn-outline-custom"
                 style="flex:1; justify-content:center;">
                Cancel
              </a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
